basePath: /api/file-service
definitions:
  file-service_service_file.File:
    properties:
      Bucket:
        $ref: '#/definitions/file.Bucket'
      FileName:
        type: string
      FileSize:
        type: integer
      ID:
        type: integer
      URL:
        type: string
    type: object
  file.Bucket:
    enum:
    - images
    - documents
    type: string
    x-enum-varnames:
    - BucketImages
    - BucketDocuments
  gorouter.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  gorouter.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/gorouter.ErrorInfo'
    type: object
info:
  contact: {}
  description: API for uploading files and reading file metadata.
  title: File Service API
  version: "1.0"
paths:
  /files:
    get:
      description: Returns metadata for several files.
      parameters:
      - collectionFormat: multi
        description: File IDs
        in: query
        items:
          type: integer
        name: id
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/file-service_service_file.File'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
      summary: Get files by IDs
      tags:
      - files
    post:
      consumes:
      - multipart/form-data
      description: Uploads one file to object storage and stores its metadata.
      parameters:
      - description: File to upload
        in: formData
        name: File
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/file-service_service_file.File'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
      summary: Upload file
      tags:
      - files
  /files/{id}:
    get:
      description: Returns file metadata and a URL by file identifier.
      parameters:
      - description: File ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/file-service_service_file.File'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gorouter.ErrorResponse'
      summary: Get file by ID
      tags:
      - files
swagger: "2.0"
